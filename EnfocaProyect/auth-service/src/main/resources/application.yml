spring:
  application:
    name: auth-service

  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/enfoca_auth
    username: postgres
    password: Kaoz1699
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        default_schema: auth
        format_sql: true

  flyway:
    enabled: true
    schemas: auth
    default-schema: auth
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8082

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000