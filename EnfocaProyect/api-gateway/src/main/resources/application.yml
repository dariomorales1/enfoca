spring:
  application:
    name: api-gateway
  profiles:
    active: local
  main:
    web-application-type: reactive
  docker:
    compose:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration
      - org.springframework.boot.amqp.autoconfigure.RabbitAutoConfiguration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
  cloud:
    gateway:
      server:
        webflux:
          streaming-media-types: "text/event-stream,application/stream+json"
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "http://localhost:5173"
                  - "https://enfoca.online"
                  - "https://www.enfoca.online"
                allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
                allowedHeaders: "*"
                exposedHeaders: ["X-Correlation-Id"]
                allowCredentials: true
                maxAge: 3600

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

enfoca:
  jwt:
    secret-key: ${JWT_SECRET_KEY:dGhpcy1pcy1hLXZlcnktc2VjdXJlLXNlY3JldC1rZXktZm9yLWRldmVsb3BtZW50LW9ubHk=}
  public-routes:
    - /auth/register
    - /auth/login
    - /auth/refresh
    - /auth/forgot-password
    - /auth/reset-password
    - /oauth2/authorize
    - /oauth2/login
    - /oauth2/token
    - /study-plans/catalog
    - /verify/**
    - /api-docs/**
    - /swagger-ui/**
    - /actuator/**
    - /favicon.ico

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
    instances:
      auth-service:
        baseConfig: default
      pomodoro-service:
        baseConfig: default
      metrics-service:
        baseConfig: default
      gamification-service:
        baseConfig: default
      study-plans-service:
        baseConfig: default
      certification-service:
        baseConfig: default
      weekly-analysis-service:
        baseConfig: default
      ai-service:
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 2
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
    instances:
      auth-service:
        baseConfig: default
      ai-service:
        maxAttempts: 3
        waitDuration: 1000ms
        exponentialBackoffMultiplier: 2
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
        cancelRunningFuture: true
    instances:
      ai-service:
        timeoutDuration: 15s

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway, circuitbreakers, retries
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: false
    ping:
      enabled: true
    redis:
      enabled: true
    diskSpace:
      enabled: true
    circuitbreakers:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
