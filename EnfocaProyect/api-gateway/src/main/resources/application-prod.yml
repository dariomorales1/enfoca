spring:
  docker:
    compose:
      enabled: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true
      timeout: 2000ms

eureka:
  instance:
    hostname: ${HOSTNAME:api-gateway}
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
    register-with-eureka: true
    fetch-registry: true

enfoca:
  jwt:
    secret-key: ${JWT_SECRET_KEY}

management:
  health:
    defaults:
      enabled: false
    ping:
      enabled: true
    redis:
      enabled: true
    diskSpace:
      enabled: true
    circuitbreakers:
      enabled: true

logging:
  level:
    root: WARN
    online.enfoca: INFO
